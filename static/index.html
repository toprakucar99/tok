<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Tok Anket - Kazanmaya Başla</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #333; text-align: center; }
        .question-card { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .question-text { font-weight: bold; margin-bottom: 10px; display: block; }
        .option-group { display: flex; flex-direction: column; gap: 8px; }
        .option-item { background: #f9f9f9; padding: 10px; border-radius: 6px; cursor: pointer; border: 1px solid #ddd; transition: 0.2s; }
        .option-item:hover { background: #eef2ff; }
        input[type="radio"] { margin-right: 10px; }
        button { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #4338ca; }
        #message { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="app">
    <h2>📊 Günlük Anket</h2>
    <div id="survey-container">
        <p>Sorular yükleniyor...</p>
    </div>
    <button onclick="submitSurvey()">Anketi Bitir & 10 Token Kazan</button>
    <div id="message"></div>
</div>

<script>
    let userEmail = "toprak"; // Test için sabit, normalde login'den gelmeli
    let questionsData = [];

    // 1. Soruları ve Şıkları Çek
    async function fetchQuestions() {
        const res = await fetch('/questions');
        questionsData = await res.json();
        
        const container = document.getElementById('survey-container');
        container.innerHTML = '';

        questionsData.forEach(q => {
            let optionsHTML = q.options.map(opt => `
                <label class="option-item">
                    <input type="radio" name="q${q.id}" value="${opt.id}">
                    ${opt.text}
                </label>
            `).join('');

            container.innerHTML += `
                <div class="question-card">
                    <span class="question-text">${q.text}</span>
                    <div class="option-group">${optionsHTML}</div>
                </div>
            `;
        });
    }

    // 2. Cevapları Topla ve Gönder
    async function submitSurvey() {
        const answers = [];
        let allAnswered = true;

        questionsData.forEach(q => {
            const selected = document.querySelector(`input[name="q${q.id}"]:checked`);
            if (selected) {
                answers.push({
                    question_id: q.id,
                    option_id: parseInt(selected.value)
                });
            } else {
                allAnswered = false;
            }
        });

        if (!allAnswered) {
            alert("Lütfen tüm soruları işaretleyin!");
            return;
        }

        const res = await fetch('/finish-survey', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: userEmail, answers: answers })
        });

        const result = await res.json();
        if (result.success) {
            document.getElementById('app').innerHTML = `<h2>✅ Tebrikler!</h2><p>${result.message}</p>`;
        } else {
            document.getElementById('message').innerText = "Hata oluştu!";
        }
    }

    fetchQuestions();
</script>

</body>
</html>
