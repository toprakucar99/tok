<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tok Bilgi Yarışması - Çöz & Kazan</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #1a1a1a; text-align: center; margin-bottom: 20px; }
        
        #login-section { display: block; } 
        #survey-section { display: none; }  
        
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .question-card { margin-bottom: 20px; padding: 15px; border-bottom: 1px solid #eee; }
        .question-text { font-weight: 600; color: #333; margin-bottom: 12px; display: block; }
        .option-group { display: flex; flex-direction: column; gap: 10px; }
        .option-item { display: flex; align-items: center; background: #f8f9fa; padding: 10px; border-radius: 8px; cursor: pointer; border: 1px solid #e9ecef; transition: 0.2s; }
        .option-item:hover { background: #e7f0ff; border-color: #4f46e5; }
        input[type="radio"] { margin-right: 12px; transform: scale(1.2); }

        button { width: 100%; padding: 14px; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 15px; transition: background 0.3s; }
        button:hover { background: #4338ca; }
        .error { color: #dc3545; font-size: 14px; text-align: center; margin-top: 10px; }
        #balance-display { text-align: center; font-weight: bold; color: #4f46e5; margin-bottom: 20px; font-size: 18px; background: #eef2ff; padding: 10px; border-radius: 8px; }
        
        /* Sonuç Ekranı Stili */
        .result-box { text-align: center; padding: 20px; }
        .result-score { font-size: 48px; font-weight: bold; color: #4f46e5; margin: 10px 0; }
        .token-badge { display: inline-block; background: #fbbf24; color: #92400e; padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <h2>👋 Hoş Geldin</h2>
        <input type="text" id="email" placeholder="E-posta">
        <input type="password" id="password" placeholder="Şifre">
        <button onclick="handleLogin()">Giriş Yap</button>
        <div id="login-error" class="error"></div>
    </div>

    <div id="survey-section">
        <h2 id="welcome-msg"></h2>
        <div id="balance-display"></div> 
        <div id="survey-container">
            <p>Sorular yükleniyor...</p>
        </div>
        <button id="submit-btn" onclick="submitSurvey()">Yarışmayı Bitir & Token Kazan</button>
        <div id="survey-error" class="error"></div>
    </div>
</div>

<script>
    let currentEmail = "";
    let questionsData = [];

    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('login-error');

        if (!email || !password) {
            errorDiv.innerText = "Lütfen alanları doldur kanka!";
            return;
        }

        try {
            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password })
            });

            const data = await res.json();

            if (data.success) {
                currentEmail = email;
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('survey-section').style.display = 'block';
                document.getElementById('welcome-msg').innerText = `🧠 Başarılar ${email}`;
                document.getElementById('balance-display').innerText = `💰 Mevcut Bakiyen: ${data.tokens} Token`;
                fetchQuestions(); 
            } else {
                errorDiv.innerText = "Giriş başarısız! Bilgilerini kontrol et.";
            }
        } catch (err) {
            errorDiv.innerText = "Sunucuya bağlanılamadı!";
        }
    }

    async function fetchQuestions() {
        try {
            const res = await fetch('/questions');
            questionsData = await res.json();
            
            const container = document.getElementById('survey-container');
            container.innerHTML = '';

            questionsData.forEach(q => {
                let optionsHTML = q.options.map(opt => `
                    <label class="option-item">
                        <input type="radio" name="q${q.id}" value="${opt.id}">
                        ${opt.text}
                    </label>
                `).join('');

                container.innerHTML += `
                    <div class="question-card">
                        <span class="question-text">${q.text}</span>
                        <div class="option-group">${optionsHTML}</div>
                    </div>
                `;
            });
        } catch (err) {
            container.innerHTML = "Sorular yüklenirken hata oluştu.";
        }
    }

    async function submitSurvey() {
        const answers = [];
        let allAnswered = true;

        questionsData.forEach(q => {
            const selected = document.querySelector(`input[name="q${q.id}"]:checked`);
            if (selected) {
                answers.push({ question_id: q.id, option_id: parseInt(selected.value) });
            } else {
                allAnswered = false;
            }
        });

        if (!allAnswered) {
            alert("Tüm soruları cevaplamalısın kanka!");
            return;
        }

        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerText = "Kontrol ediliyor...";

        try {
            const res = await fetch('/finish-survey', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: currentEmail, answers: answers })
            });

            const result = await res.json();
            if (result.success) {
                document.getElementById('survey-section').innerHTML = `
                    <div class="result-box">
                        <h2 style="color: #4f46e5;">🏁 Yarışma Bitti!</h2>
                        <div class="result-score">${result.correct_count} / ${questionsData.length}</div>
                        <p>Doğru Cevap Sayısı</p>
                        <div class="token-badge">+${result.earned_tokens} Token Kazandın!</div>
                        <p style="color: #666; font-size: 14px;">${result.message}</p>
                        <button onclick="location.reload()" style="background:#22c55e;">Harika! Geri Dön</button>
                    </div>
                `;
            }
        } catch (err) {
            alert("Bir hata oluştu kanka!");
            btn.disabled = false;
            btn.innerText = "Anketi Bitir & Token Kazan";
        }
    }
</script>

</body>
</html>
